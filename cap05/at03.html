<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT03 — Matrícula Acadêmica (Com Máscaras)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { text-align: center; color: #2c3e50; margin-top: 0; }
        .nota { color: #d9534f; font-size: 0.9rem; margin-bottom: 20px; text-align: center; }
        fieldset { border: 1px solid #ced4da; border-radius: 8px; margin-bottom: 20px; padding: 20px; }
        legend { font-weight: bold; color: #495057; padding: 0 10px; }
        .campo-grupo { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-weight: 600; margin-bottom: 5px; font-size: 0.95rem; }
        input, select { padding: 10px; border: 1px solid #adb5bd; border-radius: 5px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        .opcoes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .opcao-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .botoes { display: flex; gap: 15px; margin-top: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        button[type="submit"] { background-color: #007bff; color: white; }
        button[type="reset"] { background-color: #f8f9fa; color: #333; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <form action="https://httpbin.org/post" method="post">
        <h1>Solicitação de Matrícula</h1>
        <p class="nota">* Campos obrigatórios</p>

        <fieldset>
            <legend>Dados Pessoais</legend>
            
            <div class="campo-grupo">
                <label for="nome">Nome completo *</label>
                <input type="text" id="nome" name="nome" required minlength="5" maxlength="100">
            </div>

            <div class="campo-grupo">
                <label for="cpf">CPF * (apenas números)</label>
                <input type="text" id="cpf" name="cpf" required maxlength="14"
                       placeholder="000.000.000-00" title="CPF no formato 000.000.000-00">
            </div>

            <div class="campo-grupo">
                <label for="telefone">Telefone (apenas números)</label>
                <input type="tel" id="telefone" name="telefone" maxlength="15"
                       placeholder="(82) 99999-9999">
            </div>

            <div class="campo-grupo">
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Dados Acadêmicos</legend>

            <div class="campo-grupo">
                <label for="curso">Curso pretendido *</label>
                <select id="curso" name="curso" required>
                    <option value="">-- Selecione um curso --</option>
                    <optgroup label="Computação">
                        <option value="si">Sistemas de Informação</option>
                        <option value="cc">Ciência da Computação</option>
                        <option value="ec">Engenharia da Computação</option>
                    </optgroup>
                    <optgroup label="Gestão">
                        <option value="adm">Administração</option>
                        <option value="cont">Ciências Contábeis</option>
                    </optgroup>
                </select>
            </div>

            <fieldset>
                <legend>Período</legend>
                <div class="opcoes-grid">
                    <label class="opcao-item"><input type="radio" name="periodo" value="Manhã"> Manhã</label>
                    <label class="opcao-item"><input type="radio" name="periodo" value="Tarde"> Tarde</label>
                    <label class="opcao-item"><input type="radio" name="periodo" value="Noite"> Noite</label>
                </div>
            </fieldset>

            <div class="campo-grupo">
                <label for="ano_ingresso">Ano de ingresso pretendido *</label>
                <input type="number" id="ano_ingresso" name="ano_ingresso" min="2026" max="2030" required value="2026">
            </div>
        </fieldset>

        <fieldset>
            <legend>Áreas de Interesse</legend>
            <div class="opcoes-grid">
                <label class="opcao-item"><input type="checkbox" name="interesses[]" value="Web"> Desenvolvimento Web</label>
                <label class="opcao-item"><input type="checkbox" name="interesses[]" value="BD"> Banco de Dados</label>
                <label class="opcao-item"><input type="checkbox" name="interesses[]" value="IA"> Inteligência Artificial</label>
                <label class="opcao-item"><input type="checkbox" name="interesses[]" value="Segurança"> Segurança da Informação</label>
                <label class="opcao-item"><input type="checkbox" name="interesses[]" value="Infra"> Infraestrutura</label>
            </div>
        </fieldset>

        <div class="botoes">
            <button type="submit">Solicitar matrícula</button>
            <button type="reset">Limpar formulário</button>
        </div>
    </form>

    <script>
        document.getElementById('cpf').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = value;
        });

        document.getElementById('telefone').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            value = value.replace(/^(\d{2})(\d)/g, '($1) $2');
            value = value.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = value;
        });
    </script>

</body>
</html>
