<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT01 — Formulário de Contato</title>
    <style>
        /* Centraliza o conteúdo na tela inteira */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
            padding-top: 50px;
        }

        /* Estilização do formulário */
        form {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centraliza os itens dentro do form */
            gap: 20px;
        }

        h1 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        /* Container de cada campo para alinhar label e input */
        .campo-grupo {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center; /* Centraliza o texto digitado */
            box-sizing: border-box; /* Garante que o padding não quebre a largura */
        }

        textarea {
            resize: vertical;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <form action="https://httpbin.org/get" method="get">
        <h1>Contato</h1>

        <div class="campo-grupo">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Seu Nome Aqui" required>
        </div>

        <div class="campo-grupo">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Exemplo: seuemail@email.com" required>
        </div>

        <div class="campo-grupo">
            <label for="assunto">Assunto</label>
            <input type="text" id="assunto" name="assunto" placeholder="Sobre o que vamos falar?" required>
        </div>

        <div class="campo-grupo">
            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
        </div>

        <button type="submit">Enviar mensagem</button>
    </form>

</body>
</html>
